<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ProFile — Minimal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style3.css">
  <link rel="stylesheet" href="home.css">
</head>
<body>
  <script src="auth-guard.js"></script>

  <header class="header">
    <div class="header-logo">Pro<span>File</span></div>
    <div class="header-right">
      <a class="btn-ghost" href="my-resume.html">Saved Resumes</a>
      <button class="btn-download" onclick="generatePDF()">↓ Download PDF</button>
      <button onclick="logout()" class="btn-reset">Sign Out</button>
    </div>
  </header>

  <div class="canvas-area">
    <div id="resume">
      <div class="top-rule"></div>
      <div class="text name">
        <div class="drag-handle"></div>
        <div class="text-content" contenteditable="false">Your Name</div>
        <div class="resize-grip"></div>
      </div>
      <div class="text jobtitle">
        <div class="drag-handle"></div>
        <div class="text-content" contenteditable="false">Job Title · Location</div>
        <div class="resize-grip"></div>
      </div>
      <div class="divider-rule"></div>
      <div class="text contact-line">
        <div class="drag-handle"></div>
        <div class="text-content" contenteditable="false">email@example.com  ·  +63 912 345 6789</div>
        <div class="resize-grip"></div>
      </div>
      <div class="text main-body">
        <div class="drag-handle"></div>
        <div class="text-content" contenteditable="false">Summary: Loading...</div>
        <div class="resize-grip"></div>
      </div>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
  <script src="editor.js"></script>
  <script src="template3.js"></script>
</body>
</html>
