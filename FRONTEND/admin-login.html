<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ProFile — System Access</title>
  <meta name="robots" content="noindex, nofollow">
  <meta name="referrer" content="no-referrer">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #141918;
      --surface: #1E2420;
      --border: #2A312B;
      --accent: #4A6350;
      --sage: #6B9E78;
      --text: #EAE6DC;
      --muted: #636B64;
    }
    body {
      font-family: "DM Sans", sans-serif;
      background: var(--bg);
      background-image: radial-gradient(ellipse at 50% 0%, rgba(74,99,80,0.15) 0%, transparent 60%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 52px 44px;
      width: 100%;
      max-width: 390px;
      box-shadow: 0 0 0 1px rgba(107,158,120,0.04), 0 8px 60px rgba(0,0,0,0.5);
      animation: slideUp 0.45s cubic-bezier(.22,.68,0,1.2) both;
    }
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(20px) scale(0.98); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }
    .shield-wrap {
      display: flex;
      justify-content: center;
      margin-bottom: 20px;
    }
    .shield {
      width: 52px; height: 52px;
      background: rgba(107,158,120,0.1);
      border: 1px solid rgba(107,158,120,0.2);
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--sage);
      box-shadow: 0 0 24px rgba(107,158,120,0.12);
    }
    .logo {
      font-family: "DM Serif Display", serif;
      font-size: 24px;
      color: var(--text);
      text-align: center;
      margin-bottom: 4px;
    }
    .logo span { color: var(--sage); }
    .subtitle {
      text-align: center;
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 36px;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }
    .field { margin-bottom: 16px; }
    .field label {
      display: block;
      font-size: 11px;
      font-weight: 500;
      color: var(--muted);
      margin-bottom: 6px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }
    .field input {
      width: 100%;
      height: 46px;
      padding: 0 14px;
      font-family: "DM Sans", sans-serif;
      font-size: 14px;
      color: var(--text);
      background: var(--bg);
      border: 1.5px solid var(--border);
      border-radius: 10px;
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    .field input:focus {
      border-color: var(--sage);
      box-shadow: 0 0 0 3px rgba(107,158,120,0.12);
    }
    .field input::placeholder { color: #3A4240; }
    .btn {
      width: 100%;
      height: 46px;
      background: linear-gradient(135deg, #3d5241 0%, #4A6350 100%);
      color: var(--text);
      border: none;
      border-radius: 10px;
      font-family: "DM Sans", sans-serif;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      margin-top: 8px;
      letter-spacing: 0.02em;
      box-shadow: 0 4px 16px rgba(0,0,0,0.3);
      transition: background 0.12s, box-shadow 0.12s, transform 0.1s;
    }
    .btn:hover  { background: var(--sage); color: #141918; box-shadow: 0 6px 20px rgba(107,158,120,0.2); }
    .btn:active { transform: scale(0.98); }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; box-shadow: none; }
    .back-link {
      display: block;
      text-align: center;
      margin-top: 20px;
      font-size: 12px;
      color: var(--muted);
      text-decoration: none;
      transition: color 0.12s;
    }
    .back-link:hover { color: var(--text); }
    .error {
      background: rgba(192,57,43,0.12);
      color: #E07070;
      border: 1px solid rgba(192,57,43,0.25);
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 13px;
      margin-bottom: 16px;
      display: none;
      animation: shake 0.3s ease;
    }
    @keyframes shake {
      0%,100% { transform: translateX(0); }
      25%      { transform: translateX(-6px); }
      75%      { transform: translateX(6px); }
    }
    .spinner {
      display: inline-block;
      width: 14px; height: 14px;
      border: 2px solid rgba(232,228,218,0.2);
      border-top-color: var(--text);
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="card">
    <div class="shield-wrap">
      <div class="shield">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
        </svg>
      </div>
    </div>

    <div class="logo">Pro<span>File</span></div>
    <p class="subtitle">Administrator Access</p>

    <div class="error" id="errorMsg"></div>

    <div class="field">
      <label>Username</label>
      <input type="text" id="username" placeholder="Admin username" autocomplete="off">
    </div>
    <div class="field">
      <label>Password</label>
      <input type="password" id="password" placeholder="Admin password" autocomplete="off">
    </div>

    <button class="btn" id="loginBtn" onclick="doAdminLogin()">Access Dashboard</button>
    <a class="back-link" href="/login.html">← Back to main site</a>
  </div>

  <script>
    const stored = localStorage.getItem("profile_user")
    if (stored) {
      const u = JSON.parse(stored)
      if (u.role === "admin") window.location.href = "/admin.html"
      else window.location.href = "/index.html"
    }

    document.addEventListener("keydown", e => {
      if (e.key === "Enter") doAdminLogin()
    })

    async function doAdminLogin() {
      const username = document.getElementById("username").value.trim()
      const password = document.getElementById("password").value
      const btn      = document.getElementById("loginBtn")
      const err      = document.getElementById("errorMsg")

      if (!username || !password) {
        showError("Please fill in all fields."); return
      }

      btn.disabled = true
      btn.innerHTML = '<span class="spinner"></span>Verifying...'
      err.style.display = "none"

      try {
        const res  = await fetch("/auth/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ username, password })
        })
        const data = await res.json()

        if (!res.ok || data.role !== "admin") {
          showError("Invalid credentials or insufficient permissions.")
          btn.disabled = false
          btn.textContent = "Access Dashboard"
          return
        }

        localStorage.setItem("profile_token", data.token)
        localStorage.setItem("profile_user",  JSON.stringify({ id: data.id, username: data.username, role: data.role }))
        window.location.href = "/admin.html"

      } catch(e) {
        showError("Could not connect to server.")
        btn.disabled = false
        btn.textContent = "Access Dashboard"
      }
    }

    function showError(msg) {
      const err = document.getElementById("errorMsg")
      err.textContent = msg
      err.style.display = "block"
    }
  </script>
</body>
</html>
