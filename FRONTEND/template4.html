<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ProFile — Two Column</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style4.css">
</head>
<body>
  <script src="auth-guard.js"></script>

  <header class="header">
    <div class="header-logo">Pro<span>File</span></div>
    <div class="header-right">
      <a href="form.html?template=4" class="btn-back">← Edit Form</a>
      <button class="btn-download" onclick="generatePDF()">↓ Download PDF</button>
      <button onclick="logout()" class="btn-reset">Sign Out</button>
    </div>
  </header>

  <div class="canvas-area">
    <div id="resume">
      <div class="left-col-bg"></div>
      <div class="left-col-accent"></div>
      <div class="text name">
        <div class="drag-handle"></div>
        <div class="text-content" contenteditable="false">Your Name</div>
        <div class="resize-grip"></div>
      </div>
      <div class="text jobtitle">
        <div class="drag-handle"></div>
        <div class="text-content" contenteditable="false">Job Title</div>
        <div class="resize-grip"></div>
      </div>
      <div class="text left-body">
        <div class="drag-handle"></div>
        <div class="text-content" contenteditable="false">Contact & Skills</div>
        <div class="resize-grip"></div>
      </div>
      <div class="text main-body">
        <div class="drag-handle"></div>
        <div class="text-content" contenteditable="false">Main Experience</div>
        <div class="resize-grip"></div>
      </div>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
  <script src="canvas-engine.js"></script>
  <script src="template4.js"></script>
</body>
</html>
