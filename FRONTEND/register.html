<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ProFile — Create Account</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #EDEAE3; --surface: #F7F5F0; --border: #D4CFC4;
      --accent: #2B3A2E; --accent-lt: #4A6350; --sage: #8FB89A;
      --text: #1A1A18; --muted: #7A776E;
      --panel: #2B3A2E;
    }
    body {
      font-family: "DM Sans", sans-serif;
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      align-items: stretch;
    }

    /* ── Left panel ── */
    .left-panel {
      width: 45%;
      background: var(--panel);
      background-image:
        radial-gradient(ellipse 70% 50% at 30% 20%, rgba(143,184,154,0.18) 0%, transparent 60%),
        radial-gradient(ellipse 50% 40% at 75% 85%, rgba(107,158,120,0.12) 0%, transparent 55%);
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 48px 44px;
      position: relative;
      overflow: hidden;
    }
    .left-panel::before {
      content: "";
      position: absolute;
      inset: 0;
      background: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='%238FB89A' fill-opacity='0.04'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/svg%3E");
      pointer-events: none;
    }
    .panel-brand {
      font-family: "DM Serif Display", serif;
      font-size: 26px;
      color: #EAE6DC;
      position: relative;
      z-index: 1;
    }
    .panel-brand span { color: var(--sage); }

    .resume-stack {
      display: flex;
      align-items: center;
      justify-content: center;
      flex: 1;
      padding: 20px 0;
      position: relative;
      z-index: 1;
      overflow: visible;
    }

    .panel-tagline { position: relative; z-index: 1; }
    .panel-tagline h2 {
      font-family: "DM Serif Display", serif;
      font-size: 22px;
      color: #EAE6DC;
      line-height: 1.35;
      margin-bottom: 8px;
    }
    .panel-tagline p { font-size: 13px; color: rgba(234,230,220,0.5); line-height: 1.6; }

    /* ── Right panel ── */
    .right-panel {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 48px 40px;
      background: var(--bg);
      background-image: radial-gradient(ellipse 60% 40% at 90% 10%, rgba(143,184,154,0.09) 0%, transparent 55%);
      overflow-y: auto;
    }
    .form-box {
      width: 100%;
      max-width: 380px;
      animation: fadeIn 0.4s ease both;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateX(16px); }
      to   { opacity: 1; transform: translateX(0); }
    }
    .form-title {
      font-family: "DM Serif Display", serif;
      font-size: 26px;
      color: var(--accent);
      margin-bottom: 6px;
    }
    .form-sub { font-size: 13px; color: var(--muted); margin-bottom: 32px; }
    .form-sub a { color: var(--accent-lt); text-decoration: none; font-weight: 500; }
    .form-sub a:hover { text-decoration: underline; }

    .field { margin-bottom: 18px; }
    .field label { display: block; font-size: 12px; font-weight: 500; color: var(--text); margin-bottom: 7px; }
    .field input {
      width: 100%;
      height: 44px;
      padding: 0 14px;
      font-family: "DM Sans", sans-serif;
      font-size: 14px;
      color: var(--text);
      background: white;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    .field input:focus {
      border-color: var(--accent-lt);
      box-shadow: 0 0 0 3px rgba(143,184,154,0.18);
    }
    .field input::placeholder { color: #C4C0B8; }
    .field input.input-error { border-color: #E07070; box-shadow: 0 0 0 3px rgba(224,112,112,0.1); }
    .field input.input-ok    { border-color: #6dbf90; box-shadow: 0 0 0 3px rgba(109,191,144,0.1); }
    .hint { font-size: 11px; color: var(--muted); margin-top: 4px; }

    .btn {
      width: 100%;
      height: 46px;
      background: linear-gradient(135deg, #2B3A2E 0%, #3d5241 100%);
      color: #F0EDE5;
      border: none;
      border-radius: 10px;
      font-family: "DM Sans", sans-serif;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      margin-top: 4px;
      letter-spacing: 0.02em;
      box-shadow: 0 4px 14px rgba(43,58,46,0.22);
      transition: opacity 0.12s, transform 0.1s, box-shadow 0.12s;
    }
    .btn:hover  { opacity: 0.9; box-shadow: 0 6px 20px rgba(43,58,46,0.28); }
    .btn:active { transform: scale(0.98); }
    .btn:disabled { opacity: 0.55; cursor: not-allowed; box-shadow: none; }

    .error {
      background: #FDF0F0;
      color: #A32D2D;
      border: 1px solid #F5C6C6;
      border-radius: 10px;
      padding: 11px 14px;
      font-size: 13px;
      margin-bottom: 18px;
      display: none;
      animation: shake 0.3s ease;
    }
    .success {
      background: #E8F7F1;
      color: #0F6E56;
      border: 1px solid #A8E4CE;
      border-radius: 10px;
      padding: 11px 14px;
      font-size: 13px;
      margin-bottom: 18px;
      display: none;
    }
    @keyframes shake {
      0%,100% { transform: translateX(0); }
      25%      { transform: translateX(-5px); }
      75%      { transform: translateX(5px); }
    }
    .spinner {
      display: inline-block;
      width: 14px; height: 14px;
      border: 2px solid rgba(240,237,229,0.3);
      border-top-color: #F0EDE5;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Password strength ── */
    .strength-wrap { margin-top: 8px; }
    .strength-bars { display: flex; gap: 4px; margin-bottom: 6px; }
    .strength-bar { flex: 1; height: 3px; border-radius: 99px; background: var(--border); transition: background 0.25s; }
    .strength-bar.active-weak   { background: #E07070; }
    .strength-bar.active-fair   { background: #E0A840; }
    .strength-bar.active-strong { background: #6dbf90; }
    .strength-label { font-size: 11px; font-weight: 500; color: var(--muted); }
    .strength-label.weak   { color: #c0392b; }
    .strength-label.fair   { color: #c07800; }
    .strength-label.strong { color: #2e8b57; }
    .rules { margin-top: 8px; display: flex; flex-direction: column; gap: 4px; }
    .rule { display: flex; align-items: center; gap: 6px; font-size: 11px; color: var(--muted); }
    .rule .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--border); flex-shrink: 0; transition: background 0.2s; }
    .rule.met { color: #2e8b57; }
    .rule.met .dot { background: #6dbf90; }

    @media (max-width: 768px) {
      body { flex-direction: column; }
      .left-panel { width: 100%; min-height: 260px; padding: 32px 28px; }
      .resume-stack { padding: 20px 0; }
      .panel-tagline { display: none; }
      .right-panel { padding: 36px 24px; }
    }
  </style>
</head>
<body>

  <div class="left-panel">
    <div class="panel-brand">Pro<span>File</span></div>

    <div class="resume-stack">
      <div style="position:relative;width:300px;height:420px;">

        <!-- Paper 3 (back) -->
        <div style="position:absolute;top:40px;left:10px;width:280px;height:400px;background:rgba(255,255,255,0.04);border-radius:6px;transform:rotate(-6deg);border:1px solid rgba(255,255,255,0.08);">
          <div style="padding:28px 24px;display:flex;flex-direction:column;gap:12px;opacity:0.4;">
            <div style="height:10px;width:60%;background:rgba(255,255,255,0.15);border-radius:99px;"></div>
            <div style="height:7px;width:40%;background:rgba(255,255,255,0.1);border-radius:99px;margin-bottom:8px;"></div>
            <div style="height:1px;background:rgba(255,255,255,0.07);margin-bottom:6px;"></div>
            <div style="height:6px;width:90%;background:rgba(255,255,255,0.08);border-radius:99px;"></div>
            <div style="height:6px;width:75%;background:rgba(255,255,255,0.08);border-radius:99px;"></div>
            <div style="height:6px;width:82%;background:rgba(255,255,255,0.08);border-radius:99px;"></div>
            <div style="height:6px;width:68%;background:rgba(255,255,255,0.08);border-radius:99px;"></div>
          </div>
        </div>

        <!-- Paper 2 (middle) -->
        <div style="position:absolute;top:20px;left:20px;width:280px;height:400px;background:rgba(255,255,255,0.06);border-radius:6px;transform:rotate(-2deg);border:1px solid rgba(255,255,255,0.1);">
          <div style="padding:28px 24px;display:flex;flex-direction:column;gap:12px;opacity:0.65;">
            <div style="height:10px;width:55%;background:rgba(255,255,255,0.15);border-radius:99px;"></div>
            <div style="height:7px;width:38%;background:rgba(255,255,255,0.1);border-radius:99px;margin-bottom:8px;"></div>
            <div style="height:1px;background:rgba(255,255,255,0.07);margin-bottom:6px;"></div>
            <div style="height:6px;width:88%;background:rgba(255,255,255,0.08);border-radius:99px;"></div>
            <div style="height:6px;width:70%;background:rgba(255,255,255,0.08);border-radius:99px;"></div>
            <div style="height:6px;width:80%;background:rgba(255,255,255,0.08);border-radius:99px;"></div>
            <div style="height:6px;width:65%;background:rgba(255,255,255,0.08);border-radius:99px;"></div>
            <div style="height:6px;width:74%;background:rgba(255,255,255,0.08);border-radius:99px;"></div>
          </div>
        </div>

        <!-- Paper 1 (front) -->
        <div style="position:absolute;top:0;left:30px;width:280px;height:410px;background:#f7f5f0;border-radius:6px;transform:rotate(2deg);border:0.5px solid #d4cfc4;box-shadow:4px 8px 32px rgba(0,0,0,0.18);">
          <!-- Header block -->
          <div style="background:#2b3a2e;border-radius:6px 6px 0 0;padding:22px 20px;display:flex;flex-direction:column;gap:8px;">
            <div style="height:12px;width:55%;background:rgba(255,255,255,0.7);border-radius:99px;"></div>
            <div style="height:8px;width:38%;background:rgba(143,184,154,0.6);border-radius:99px;"></div>
            <div style="margin-top:6px;display:flex;gap:12px;">
              <div style="height:6px;width:28%;background:rgba(255,255,255,0.25);border-radius:99px;"></div>
              <div style="height:6px;width:22%;background:rgba(255,255,255,0.25);border-radius:99px;"></div>
            </div>
          </div>
          <!-- Body -->
          <div style="padding:18px 20px;display:flex;flex-direction:column;gap:14px;">
            <div>
              <div style="height:7px;width:35%;background:#4a6350;border-radius:99px;margin-bottom:10px;"></div>
              <div style="display:flex;flex-direction:column;gap:7px;">
                <div style="height:6px;width:92%;background:#d4cfc4;border-radius:99px;"></div>
                <div style="height:6px;width:78%;background:#d4cfc4;border-radius:99px;"></div>
                <div style="height:6px;width:85%;background:#d4cfc4;border-radius:99px;"></div>
              </div>
            </div>
            <div style="height:1px;background:#e8e3d8;"></div>
            <div>
              <div style="height:7px;width:30%;background:#4a6350;border-radius:99px;margin-bottom:10px;"></div>
              <div style="display:flex;flex-direction:column;gap:7px;">
                <div style="height:6px;width:80%;background:#d4cfc4;border-radius:99px;"></div>
                <div style="height:6px;width:65%;background:#d4cfc4;border-radius:99px;"></div>
              </div>
            </div>
            <div style="height:1px;background:#e8e3d8;"></div>
            <div>
              <div style="height:7px;width:25%;background:#4a6350;border-radius:99px;margin-bottom:10px;"></div>
              <div style="display:flex;gap:8px;flex-wrap:wrap;">
                <div style="height:18px;width:52px;background:rgba(143,184,154,0.35);border-radius:99px;"></div>
                <div style="height:18px;width:42px;background:rgba(143,184,154,0.35);border-radius:99px;"></div>
                <div style="height:18px;width:60px;background:rgba(143,184,154,0.35);border-radius:99px;"></div>
                <div style="height:18px;width:46px;background:rgba(143,184,154,0.35);border-radius:99px;"></div>
              </div>
            </div>
            <div style="height:1px;background:#e8e3d8;"></div>
            <div style="display:flex;flex-direction:column;gap:7px;">
              <div style="height:6px;width:88%;background:#d4cfc4;border-radius:99px;"></div>
              <div style="height:6px;width:72%;background:#d4cfc4;border-radius:99px;"></div>
              <div style="height:6px;width:60%;background:#d4cfc4;border-radius:99px;"></div>
            </div>
          </div>
        </div>

        <!-- PDF badge -->
        <div style="position:absolute;bottom:0px;right:0;background:rgba(143,184,154,0.15);color:#8fb89a;font-size:11px;font-weight:500;padding:6px 14px;border-radius:99px;border:1px solid rgba(143,184,154,0.2);letter-spacing:0.05em;">PDF ready</div>

      </div>
    </div>

    <div class="panel-tagline">
      <h2>Your resume,<br>professionally done.</h2>
      <p>Build, customize, and export<br>job-ready resumes in minutes.</p>
    </div>
  </div>

  <div class="right-panel">
    <div class="form-box">
      <h1 class="form-title">Create account</h1>
      <p class="form-sub">Already have one? <a href="/login.html">Sign in</a></p>

      <div class="error"   id="errorMsg"></div>
      <div class="success" id="successMsg"></div>

      <div class="field">
        <label>Full Name</label>
        <input type="text" id="fullname" placeholder="e.g. Juan dela Cruz" autocomplete="name">
      </div>
      <div class="field">
        <label>Username</label>
        <input type="text" id="username" placeholder="e.g. juandelacruz" autocomplete="username">
        <p class="hint">Letters and numbers only, no spaces.</p>
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" id="password" placeholder="At least 8 characters" autocomplete="new-password" oninput="checkStrength()">
        <div class="strength-wrap" id="strengthWrap" style="display:none;">
          <div class="strength-bars">
            <div class="strength-bar" id="bar1"></div>
            <div class="strength-bar" id="bar2"></div>
            <div class="strength-bar" id="bar3"></div>
            <div class="strength-bar" id="bar4"></div>
          </div>
          <span class="strength-label" id="strengthLabel"></span>
          <div class="rules">
            <div class="rule" id="rule-len"><div class="dot"></div>At least 8 characters</div>
            <div class="rule" id="rule-upper"><div class="dot"></div>One uppercase letter</div>
            <div class="rule" id="rule-num"><div class="dot"></div>One number</div>
            <div class="rule" id="rule-special"><div class="dot"></div>One special character (!@#$...)</div>
          </div>
        </div>
      </div>
      <div class="field">
        <label>Confirm Password</label>
        <input type="password" id="confirm" placeholder="Repeat your password" autocomplete="new-password" oninput="checkConfirm()">
        <p class="hint" id="confirmHint" style="display:none;"></p>
      </div>

      <button class="btn" id="registerBtn" onclick="doRegister()">Create Account</button>
    </div>
  </div>

  <script>
    if (localStorage.getItem("profile_token")) {
      window.location.href = "/index.html"
    }

    document.addEventListener("keydown", e => {
      if (e.key === "Enter") doRegister()
    })

    function checkStrength() {
      const pw    = document.getElementById("password").value
      const wrap  = document.getElementById("strengthWrap")
      const label = document.getElementById("strengthLabel")
      const bars  = [document.getElementById("bar1"), document.getElementById("bar2"),
                     document.getElementById("bar3"), document.getElementById("bar4")]

      if (!pw) { wrap.style.display = "none"; return }
      wrap.style.display = "block"

      const rules = {
        len:     pw.length >= 8,
        upper:   /[A-Z]/.test(pw),
        num:     /[0-9]/.test(pw),
        special: /[^a-zA-Z0-9]/.test(pw)
      }

      document.getElementById("rule-len").className     = "rule" + (rules.len     ? " met" : "")
      document.getElementById("rule-upper").className   = "rule" + (rules.upper   ? " met" : "")
      document.getElementById("rule-num").className     = "rule" + (rules.num     ? " met" : "")
      document.getElementById("rule-special").className = "rule" + (rules.special ? " met" : "")

      const score = Object.values(rules).filter(Boolean).length
      bars.forEach(b => b.className = "strength-bar")

      if (score <= 1) {
        bars[0].classList.add("active-weak")
        label.textContent = "Weak"; label.className = "strength-label weak"
      } else if (score === 2) {
        bars[0].classList.add("active-fair"); bars[1].classList.add("active-fair")
        label.textContent = "Fair"; label.className = "strength-label fair"
      } else if (score === 3) {
        bars[0].classList.add("active-strong"); bars[1].classList.add("active-strong")
        bars[2].classList.add("active-strong")
        label.textContent = "Good"; label.className = "strength-label strong"
      } else {
        bars.forEach(b => b.classList.add("active-strong"))
        label.textContent = "Strong"; label.className = "strength-label strong"
      }
    }

    function checkConfirm() {
      const pw      = document.getElementById("password").value
      const confirm = document.getElementById("confirm")
      const hint    = document.getElementById("confirmHint")

      if (!confirm.value) { hint.style.display = "none"; confirm.className = ""; return }

      if (confirm.value === pw) {
        hint.style.display = "none"
        confirm.classList.remove("input-error")
        confirm.classList.add("input-ok")
      } else {
        hint.textContent = "Passwords don't match."
        hint.style.display = "block"
        hint.style.color = "#c0392b"
        confirm.classList.remove("input-ok")
        confirm.classList.add("input-error")
      }
    }

    async function doRegister() {
      const fullname = document.getElementById("fullname").value.trim()
      const username = document.getElementById("username").value.trim()
      const password = document.getElementById("password").value
      const confirm  = document.getElementById("confirm").value
      const btn      = document.getElementById("registerBtn")
      const err      = document.getElementById("errorMsg")
      const suc      = document.getElementById("successMsg")

      err.style.display = "none"
      suc.style.display = "none"

      if (!fullname || !username || !password || !confirm) {
        showError("Please fill in all fields."); return
      }
      if (!/^[a-zA-Z0-9]+$/.test(username)) {
        showError("Username can only contain letters and numbers."); return
      }
      if (password.length < 8) {
        showError("Password must be at least 8 characters."); return
      }
      if (!/[A-Z]/.test(password)) {
        showError("Password must contain at least one uppercase letter."); return
      }
      if (!/[0-9]/.test(password)) {
        showError("Password must contain at least one number."); return
      }
      if (!/[^a-zA-Z0-9]/.test(password)) {
        showError("Password must contain at least one special character."); return
      }
      if (password !== confirm) {
        showError("Passwords do not match."); return
      }

      btn.disabled = true
      btn.innerHTML = '<span class="spinner"></span>Creating account...'

      try {
        const res  = await fetch("/auth/register", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ fullname, username, password })
        })
        const data = await res.json()

        if (!res.ok) {
          showError(data.error || "Registration failed.")
          btn.disabled = false
          btn.textContent = "Create Account"
          return
        }

        suc.textContent = "Account created! Redirecting to login..."
        suc.style.display = "block"
        setTimeout(() => window.location.href = "/login.html", 1500)

      } catch(e) {
        showError("Could not connect to server.")
        btn.disabled = false
        btn.textContent = "Create Account"
      }
    }

    function showError(msg) {
      const err = document.getElementById("errorMsg")
      err.textContent = msg
      err.style.display = "block"
    }
  </script>
</body>
</html>
