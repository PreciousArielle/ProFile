<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ProFile — Admin Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #1A1F1B; --surface: #222722; --border: #2E352F;
      --accent: #4A6350; --sage: #6B9E78; --text: #E8E4DA; --danger: #C0392B;
    }
    body { font-family: "DM Sans", sans-serif; background: var(--bg); color: var(--text); display: flex; min-height: 100vh; }
    
    /* Sidebar */
    .sidebar { width: 260px; border-right: 1px solid var(--border); padding: 24px; display: flex; flex-direction: column; gap: 8px; }
    .nav-item { background: none; border: none; color: var(--text); padding: 12px; text-align: left; cursor: pointer; border-radius: 6px; opacity: 0.7; transition: 0.2s; }
    .nav-item:hover { background: var(--surface); opacity: 1; }
    .nav-item.active { background: var(--accent); opacity: 1; font-weight: 500; }

    /* Main Content */
    .main-content { flex: 1; padding: 40px; overflow-y: auto; }
    .content-section { display: none; }
    .content-section.active { display: block; }

    /* Stats Cards */
    .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 24px; margin-bottom: 40px; }
    .stat-card { background: var(--surface); padding: 24px; border: 1px solid var(--border); border-radius: 12px; }
    .stat-card h3 { font-size: 14px; color: var(--sage); text-transform: uppercase; margin-bottom: 8px; }
    .stat-card p { font-size: 32px; font-family: "DM Serif Display", serif; }

    /* Tables */
    table { width: 100%; border-collapse: collapse; background: var(--surface); border-radius: 8px; overflow: hidden; }
    th, td { padding: 16px; text-align: left; border-bottom: 1px solid var(--border); }
    th { color: var(--sage); font-size: 14px; text-transform: uppercase; }
    .badge { background: var(--accent); padding: 4px 8px; border-radius: 4px; font-size: 12px; }
    .btn-danger { background: var(--danger); border: none; color: white; padding: 6px 12px; border-radius: 4px; cursor: pointer; }

    .log-item { background: var(--surface); padding: 12px; border: 1px solid var(--border); border-radius: 6px; margin-bottom: 8px; font-size: 14px; }
    .accent { color: var(--sage); }
  </style>
</head>
<body>

  <div class="sidebar">
    <h2 style="font-family: 'DM Serif Display'; margin-bottom: 24px;">Admin</h2>
    <button class="nav-item active" onclick="showSection('overview-section')">Overview</button>
    <button class="nav-item" onclick="showSection('users-section')">Manage Users</button>
    <button class="nav-item" onclick="showSection('audit-section')">Audit Logs</button>
    <div style="margin-top: auto; padding-top: 20px; border-top: 1px solid var(--border);">
      <p style="font-size: 12px; color: var(--sage); margin-bottom: 10px;">Logged in as: <span id="admin-name">...</span></p>
      <button class="nav-item" onclick="logout()" style="width: 100%; color: var(--danger);">Sign Out</button>
    </div>
  </div>

  <div class="main-content">
    <div id="overview-section" class="content-section active">
      <h1 style="margin-bottom: 24px; font-family: 'DM Serif Display';">System Overview</h1>
      <div class="stats-grid">
        <div class="stat-card"><h3>Total Users</h3><p id="stat-users">0</p></div>
        <div class="stat-card"><h3>Resumes Built</h3><p id="stat-resumes">0</p></div>
        <div class="stat-card"><h3>Actions Logged</h3><p id="stat-logs">0</p></div>
      </div>
    </div>

    <div id="users-section" class="content-section">
      <h1 style="margin-bottom: 24px; font-family: 'DM Serif Display';">Manage Users</h1>
      <table>
        <thead>
          <tr><th>Username</th><th>Full Name</th><th>Role</th><th>Joined</th><th>Actions</th></tr>
        </thead>
        <tbody id="user-table-body"></tbody>
      </table>
    </div>

    <div id="audit-section" class="content-section">
      <h1 style="margin-bottom: 24px; font-family: 'DM Serif Display';">System Audit Logs</h1>
      <div id="audit-log-body"></div>
    </div>
  </div>

  <script>
    // 1. Navigation Logic
    function showSection(id) {
      document.querySelectorAll('.content-section').forEach(s => s.classList.remove('active'));
      document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
      
      document.getElementById(id).classList.add('active');
      event.currentTarget.classList.add('active');
    }

    // 2. Core API Helper
    async function api(path, options = {}) {
      const token = localStorage.getItem("profile_token");
      if (!token) { window.location.href = "admin-login.html"; return null; }

      const defaultOptions = {
        headers: {
          "Content-Type": "application/json",
          "Authorization": `Bearer ${token}`
        }
      };

      try {
        const res = await fetch(path, { ...defaultOptions, ...options });
        if (res.status === 401 || res.status === 403) { window.location.href = "admin-login.html"; return null; }
        return await res.json();
      } catch (e) { console.error("API Error:", e); return null; }
    }

    // 3. Data Loaders
    async function loadStats() {
      const data = await api("/admin/stats");
      if (data) {
        document.getElementById("stat-users").textContent = data.userCount || 0;
        document.getElementById("stat-resumes").textContent = data.resumeCount || 0;
        document.getElementById("stat-logs").textContent = data.logCount || 0;
      }
    }

    async function loadUsers() {
      const users = await api("/admin/users");
      const el = document.getElementById("user-table-body");
      if (users) {
        el.innerHTML = users.map(u => `
          <tr>
            <td>${esc(u.username)}</td>
            <td>${esc(u.full_name)}</td>
            <td><span class="badge">${u.role}</span></td>
            <td>${fmtDate(u.created_at)}</td>
            <td><button class="btn-danger" onclick="deleteUser(${u.id})">Delete</button></td>
          </tr>
        `).join("");
      }
    }

    async function loadAuditLogs() {
      const logs = await api("/admin/audit");
      const el = document.getElementById("audit-log-body");
      if (logs) {
        el.innerHTML = logs.map(l => `
          <div class="log-item">
            <strong>${fmtDate(l.created_at, true)}</strong> — 
            <span class="accent">${esc(l.username || 'System')}</span> 
            <b>${l.action}</b>: ${esc(l.details)}
          </div>
        `).join("");
      }
    }

    async function deleteUser(id) {
      if (!confirm("Delete this user?")) return;
      await api(`/admin/users/${id}`, { method: 'DELETE' });
      loadUsers(); loadStats();
    }

    // 4. Utility & Init
    function esc(str) { return String(str || "").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }
    function fmtDate(iso, time = false) { 
      const d = new Date(iso); 
      return time ? d.toLocaleString() : d.toLocaleDateString(); 
    }
    function logout() { localStorage.clear(); window.location.href = "admin-login.html"; }

    async function init() {
      const user = JSON.parse(localStorage.getItem("profile_user") || "{}");
      if (user.role !== 'admin') { window.location.href = "admin-login.html"; return; }
      document.getElementById("admin-name").textContent = user.username;
      
      await Promise.all([loadStats(), loadUsers(), loadAuditLogs()]);
    }

    init();
  </script>
</body>
</html>
