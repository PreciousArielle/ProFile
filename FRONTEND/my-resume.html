<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Resumes - ProFile</title>
  <link rel="stylesheet" href="my-resume.css">
<body>
  <script src="auth-guard.js"></script>

  <!-- SAME HEADER AS HOME -->
  <header class="site-header">
    <a class="logo" href="index.html">Pro<span>File</span></a>

    <nav class="site-nav">
      <a class="nav-link" href="index.html#features">Features</a>
      <a class="nav-link" href="index.html#templates">Templates</a>
      <a class="nav-link" href="index.html#how-it-works">How It Works</a>
    </nav>

    <div class="header-actions">
      <a class="btn-ghost" href="form.html?template=1">New Resume</a>
      <button onclick="logout()" class="btn-reset">Sign Out</button>
    </div>
  </header>

  <!-- MAIN -->
  <main class="section">
    <div class="section-header">
      <div>
        <span class="section-kicker">Your Work</span>
        <h2 class="section-title">My Resumes</h2>
      </div>
      <span class="section-sub">Edit, duplicate, or download your saved resumes.</span>
    </div>

    <div id="resumeList" class="resume-grid">
      <!-- JS will inject cards here -->
    </div>
  </main>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #e7e4dc;
    --sage: #76b25b;
    --text: #182018;
    --muted: #667060;
    --accent: #203225;
  }

  body {
    font-family: "DM Sans", sans-serif;
    background: radial-gradient(circle at top left, rgba(118,178,91,0.10), transparent 24%),
      radial-gradient(circle at bottom right, rgba(118,178,91,0.08), transparent 20%),
      linear-gradient(180deg, #e9e6de 0%, #e4e0d6 100%);
    color: var(--text);
    min-height: 100vh;
  }

  .site-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 36px;
    height: 64px;
    background: rgba(32, 50, 37, 0.94);
    backdrop-filter: blur(10px);
    position: sticky;
    top: 0;
    z-index: 100;
    border-bottom: 1px solid rgba(255,255,255,0.06);
  }

  .logo {
    font-family: "DM Serif Display", serif;
    font-size: 22px;
    color: #f3f0e8;
    text-decoration: none;
  }

  .logo span { color: var(--sage); }

  .site-nav {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .nav-link {
    font-size: 13px;
    color: rgba(243,240,232,0.72);
    text-decoration: none;
    padding: 8px 12px;
    border-radius: 999px;
    transition: color 0.15s, background 0.15s;
  }

  .nav-link:hover {
    color: #fff;
    background: rgba(255,255,255,0.06);
  }

  .header-actions {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .btn-ghost {
    height: 36px;
    padding: 0 14px;
    display: inline-flex;
    align-items: center;
    text-decoration: none;
    color: #182018;
    background: var(--sage);
    border-radius: 10px;
    font-size: 13px;
    font-weight: 500;
    border: none;
    cursor: pointer;
    font-family: "DM Sans", sans-serif;
  }

  .btn-reset {
    height: 36px;
    padding: 0 14px;
    background: transparent;
    color: rgba(243,240,232,0.78);
    border: 1px solid rgba(243,240,232,0.16);
    border-radius: 10px;
    font-size: 13px;
    cursor: pointer;
    font-family: "DM Sans", sans-serif;
  }

  .section {
    max-width: 1280px;
    margin: 0 auto;
    padding: 40px 24px 32px;
  }

  .section-header {
    display: flex;
    align-items: end;
    justify-content: space-between;
    gap: 20px;
    margin-bottom: 20px;
  }

  .section-title {
    font-family: "DM Serif Display", serif;
    font-size: clamp(28px, 3vw, 44px);
    font-weight: 400;
  }

  .section-kicker {
    display: inline-block;
    font-size: 11px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--sage);
    margin-bottom: 10px;
  }

  .section-sub {
    font-size: 14px;
    color: var(--muted);
  }

  .site-footer {
    text-align: center;
    padding: 28px 24px 42px;
    font-size: 12px;
    color: var(--muted);
  }

  /* ── Template preview mockups (ported from home.css) ── */
  .template-preview {
    position: relative;
    width: 100%;
    aspect-ratio: 794 / 1123;
    background: #f8f7f4;
    overflow: hidden;
    border-radius: 4px;
  }

  /* Shared placeholder element styles */
  .p-sidebar {
    position: absolute;
    left: 0; top: 0;
    width: 24%; height: 100%;
    background: #2C2C2C;
  }
  .p-col-l {
    position: absolute;
    left: 0; top: 0;
    width: 36%; height: 100%;
    background: #cac8c3;
  }
  .p-name {
    position: absolute;
    left: 28%; top: 8%;
    width: 44%; height: 4%;
    background: #1A1A18;
    border-radius: 2px;
  }
  .p-sub {
    position: absolute;
    left: 28%; top: 15%;
    width: 30%; height: 2.5%;
    background: #9a9690;
    border-radius: 2px;
  }
  .p-rule {
    position: absolute;
    left: 6%; top: 20%;
    width: 88%; height: 1px;
    background: #ccc;
  }

  /* Lines for main content area */
  .p-line, .p-line-r {
    position: absolute;
    height: 2%;
    border-radius: 2px;
    background: #d4d0c8;
  }
  .p-line-1 { left: 28%; top: 24%; width: 60%; }
  .p-line-2 { left: 28%; top: 28%; width: 48%; }
  .p-line-3 { left: 28%; top: 36%; width: 55%; }
  .p-line-6 { left: 28%; top: 58%; width: 50%; }

  /* Two-column right-side lines */
  .p-line-r { left: auto; }
  .p-line-r.p-line-6 { right: 4%; top: 42%; width: 25%; }

  /* Template-specific overrides */

  /* T1: Classic Sidebar — dark left panel, lines shifted right */
  .preview-t1 .p-name { left: 28%; background: #fff; }
  .preview-t1 .p-sub  { left: 28%; background: rgba(255,255,255,0.5); }

  /* T2: Modern Header — diagonal header, white text */
  .preview-t2 .p-name { left: 6%; top: 5%;  background: #fff; opacity: 0.9; }
  .preview-t2 .p-sub  { left: 6%; top: 13%; background: rgba(255,255,255,0.5); }
  .preview-t2 .p-line-4 { left: 6%; top: 30%; width: 55%; }
  .preview-t2 .p-line-5 { left: 6%; top: 36%; width: 44%; }
  .preview-t2 .p-line-6 { left: 6%; top: 44%; width: 50%; }

  /* T3: Minimal — no sidebar, centered-ish, ruled divider */
  .preview-t3 .p-name { left: 6%; top: 6%; background: #1A1A18; }
  .preview-t3 .p-sub  { left: 6%; top: 14%; background: #9a9690; }
  .preview-t3 .p-line-4 { left: 6%; top: 26%; width: 70%; }
  .preview-t3 .p-line-5 { left: 6%; top: 32%; width: 55%; }
  .preview-t3 .p-line-6 { left: 6%; top: 40%; width: 62%; }

  /* T4: Two Column — left tinted panel + right content */
  .preview-t4 .p-name { left: 40%; top: 6%; background: #1A1A18; }
  .preview-t4 .p-sub  { left: 40%; top: 14%; background: #9a9690; }
  .preview-t4 .p-line-1 { left: 40%; top: 24%; width: 52%; }
  .preview-t4 .p-line-2 { left: 40%; top: 30%; width: 42%; }
  .preview-t4 .p-line-3 { left: 40%; top: 38%; width: 48%; }
</style>
  

 <script>
function getToken() {
    return localStorage.getItem('profile_token');
}

function formatDate(dateStr) {
    const date = new Date(dateStr);
    return date.toLocaleDateString('en-US', {
        year: 'numeric', month: 'short', day: 'numeric'
    });
}

function getTemplateMockup(templateNum) {
    const mocks = {
        1: `<div class="template-preview preview-t1">
                <div class="p-sidebar" style="background:#2C2C2C;"></div>
                <div style="position:absolute;left:0;top:0;width:24%;height:28%;background:#3A3A3A;"></div>
                <div class="p-name" style="background:#1A1A18;"></div>
                <div class="p-sub" style="background:#D4CFC4;"></div>
                <div class="p-line p-line-1"></div><div class="p-line p-line-2"></div>
                <div class="p-line p-line-3"></div><div class="p-line p-line-4"></div>
            </div>`,
        2: `<div class="template-preview preview-t2">
                <div style="position:absolute;left:0;top:0;width:100%;height:22%;background:#4A5568;clip-path:polygon(0 0,100% 0,100% 75%,0 100%);"></div>
                <div class="p-name" style="background:white;opacity:0.9;top:5%;left:6%;"></div>
                <div class="p-sub" style="background:rgba(255,255,255,0.5);top:13%;left:6%;"></div>
                <div class="p-line p-line-4"></div><div class="p-line p-line-5"></div>
            </div>`,
        3: `<div class="template-preview preview-t3">
                <div class="p-name"></div><div class="p-sub"></div><div class="p-rule"></div>
                <div class="p-line p-line-4"></div><div class="p-line p-line-5"></div>
            </div>`,
        4: `<div class="template-preview preview-t4">
                <div class="p-col-l"></div><div class="p-name"></div><div class="p-sub"></div>
                <div class="p-line p-line-1"></div><div class="p-line p-line-2"></div>
                <div class="p-line-r p-line-4"></div><div class="p-line-r p-line-5"></div>
            </div>`
    };
    
    // Logic fix: Only one return statement. Defaults to Template 1 if number is weird.
    return mocks[templateNum] || mocks[1];
}

async function loadResumes() {
    const token = getToken();
    const container = document.getElementById('resumeList');

    try {
        const res = await fetch('/api/resumes', {
            headers: { 'Authorization': `Bearer ${token}` }
        });

        if (!res.ok) {
            if (res.status === 401) {
                container.innerHTML = "<p>Session expired. Please <a href='login.html'>log in again</a>.</p>";
                return;
            }
            throw new Error(`Server error: ${res.status}`);
        }

        const data = await res.json();
        container.innerHTML = '';

        if (!data.length) {
            container.innerHTML = "<p style='grid-column: 1/-1; text-align: center; color: #667060;'>No resumes yet. <a href='form.html?template=1' style='color: #76b25b;'>Create your first one!</a></p>";
            return;
        }

        data.forEach(r => {
            const card = document.createElement('div');
            card.className = 'resume-card'; 

            card.innerHTML = `
                <div class="resume-preview" style="position:relative;">
                    ${getTemplateMockup(r.template_num)}
                </div>
                <div class="resume-info">
                    <span class="resume-name">${r.title || 'Untitled Resume'}</span>
                    <span style="font-size:11px; color:#999; display:block; margin-top:2px;">
                        Last updated: ${r.updated_at ? formatDate(r.updated_at) : 'N/A'}
                    </span>
                    <div style="display:flex; gap:6px; margin-top:12px;">
                        <button onclick="editResume(${r.id}, ${r.template_num})" class="btn-ghost">Edit</button>
                        <button onclick="deleteResume(${r.id})" class="btn-danger">Delete</button>
                    </div>
                </div>
            `;
            container.appendChild(card);
        });
    } catch (err) {
        console.error('Failed to load resumes:', err);
        container.innerHTML = "<p>Something went wrong loading your resumes. Please try again later.</p>";
    }
}

function editResume(id, templateNum) {
    window.location.href = `form.html?id=${id}&template=${templateNum}`;
}

async function deleteResume(id) {
    if (!confirm("Delete this resume? This cannot be undone.")) return;
    const token = getToken();
    try {
        const res = await fetch(`/api/resumes/${id}`, {
            method: 'DELETE',
            headers: { 'Authorization': `Bearer ${token}` }
        });
        if (!res.ok) throw new Error('Delete failed');
        loadResumes(); // Reload the list
    } catch (err) {
        alert('Could not delete. Please try again.');
    }
}

// Kick off the load
loadResumes();
</script>
